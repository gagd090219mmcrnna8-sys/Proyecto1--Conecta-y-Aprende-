<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Progreso</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="card">

    <!-- Estrellas animadas -->
    <div class="estrellas">
        <span>★</span>
        <span>★</span>
        <span>★</span>
        <span>★</span>
        <span>★</span>
        <span>★</span>
        <span>★</span>
    </div>

    <div class="contenedor">

        <h1>Mi Progreso</h1>

        <p>
            Sigue avanzando para completar el curso y obtener tu certificado.
        </p>

        <div class="barra">

        </div>

        <br>

        {% if porcentaje == 100 %}

            <a href="/certificado" class="btn-link">
                Descargar Certificado
            </a>

        {% else %}

            <p>
                Completa el 100% del curso para desbloquear tu certificado.
            </p>

        {% endif %}

        <br><br>

        <a href="/usuario" class="btn-link btn-secundario">
            Regresar
        </a>

    </div>

</div>
</body>
</html>
