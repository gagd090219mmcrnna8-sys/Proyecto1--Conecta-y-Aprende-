<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Agregar Lección</title>
    <link rel="stylesheet"
href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <div class="burbujas">
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
</div>

<div class="card">
<h1>Nueva Lección</h1>

<form method="POST" enctype="multipart/form-data">

    <label>Título</label>
    <br>
    <input type="text" name="titulo" required>

    <br><br>

    <label>Contenido</label>
    <br>
    <textarea name="contenido" rows="5" cols="50"></textarea>

    <br><br>

    <label>Módulo</label>
    <br>
    <select name="modulo" required>

    <option value="">
        Seleccione un módulo
    </option>

    {% for modulo in modulos %}

    <option value="{{ modulo.numero }}">
        Módulo {{ modulo.numero }} - {{ modulo.nombre }}
    </option>

    {% endfor %}

</select>

    <br><br>

    <label>Imagen</label>
    <br>
    <input type="file" name="imagen">

    <br><br>

    <label>Video</label>
    <br>
    <input type="file" name="video">

    <br><br>

    <button type="submit" class="btn-link">
        Guardar
    </button>

</form>

<br>

<a href="/lecciones" class="btn-link">
    Regresar
</a>

</div>
</body>
</html>
